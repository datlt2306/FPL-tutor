<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
            crossorigin="anonymous"
        />
    </head>
    <body>
        <div class="container py-5">
            <div class="d-flex justify-content-between align-items-center">
                <h2>Danh sách sản phẩm</h2>
                <a href="add.html" class="btn btn-primary">Thêm sản phẩm</a>
            </div>
            <table class="table table-bordered mt-3">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="product-list"></tbody>
            </table>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
            crossorigin="anonymous"
        ></script>

        <script>
            const productListEl = document.getElementById("product-list");
            const API_URI = "http://localhost:3000/products";

            const getProducts = async () => {
                const response = await fetch(API_URI);
                const data = await response.json();
                productListEl.innerHTML = data
                    .map(
                        (product, index) => `
                            <tr>
                                <td>${index + 1}</td>
                                <td>
                                    <img src="${product.image}" alt="${product.name}" width="100" />
                                </td>
                                <td>${product.name}</td>
                                <td>${product.price} VNĐ</td>
                                <td width="150">
                                    <a href="edit.html?id=${
                                        product.id
                                    }" class="btn btn-primary">Sửa</a>
                                    <button class="btn btn-danger" onclick="deleteProduct(${
                                        product.id
                                    })">Xóa</button>
                                </td>
                            </tr>
                        `
                    )
                    .join("");
            };
            getProducts();

            const deleteProduct = async (id) => {
                const confirm = window.confirm("Bạn có chắc chắn muốn xóa sản phẩm này không?");
                if (!confirm) return;
                await fetch(`${API_URI}/${id}`, { method: "DELETE" });
                alert("Xóa sản phẩm thành công");
                getProducts();
            };

            // fetch data
            // async/await
        </script>
    </body>
</html>
