<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Thêm/Sửa sản phẩm</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            rel="stylesheet"
        />
        <style>
            body {
                background-color: #f8f9fa;
            }
            .form-container {
                max-width: 800px;
                margin: 50px auto;
                padding: 30px;
                background: white;
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            }
            .preview-image {
                max-width: 200px;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="form-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 id="formTitle">Thêm sản phẩm mới</h2>
                    <a href="list.html" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </a>
                </div>

                <form id="productForm">
                    <input type="hidden" id="productId" />
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label">Tên sản phẩm</label>
                                <input type="text" class="form-control" id="name" />
                            </div>
                            <div class="mb-3">
                                <label for="price" class="form-label">Giá</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="price" />
                                    <span class="input-group-text">VNĐ</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="image" class="form-label">URL hình ảnh</label>
                                <input type="url" class="form-control" id="image" />
                                <img id="imagePreview" class="preview-image d-none" alt="Preview" />
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả</label>
                        <textarea
                            class="form-control"
                            id="description"
                            rows="4"
                            required
                        ></textarea>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Lưu sản phẩm
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            const id = new URLSearchParams(window.location.search).get("id");

            async function loadProduct() {
                if (!id) return;
                try {
                    const response = await fetch(`http://localhost:3000/products/${id}`);
                    const product = await response.json();

                    document.getElementById("name").value = product.name;
                    document.getElementById("price").value = product.price;
                    document.getElementById("description").value = product.description;
                    document.getElementById("image").value = product.image;
                } catch (error) {}
            }
            if (id) {
                loadProduct();
            }

            document.getElementById("productForm").addEventListener("submit", async (e) => {
                e.preventDefault();
                const product = {
                    name: document.getElementById("name").value,
                    price: document.getElementById("price").value,
                    description: document.getElementById("description").value,
                    image: document.getElementById("image").value,
                };
                try {
                    const url = id
                        ? `http://localhost:3000/products/${id}`
                        : "http://localhost:3000/products";

                    const method = id ? "PUT" : "POST";

                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(product),
                    });
                    if (!response.ok) new Error("Lỗi API");

                    alert(id ? "Cập nhật sản phẩm thành công!" : "Thêm sản phẩm thành công!");
                    window.location.href = "list.html";
                } catch (error) {
                    alert("Đã có lỗi xảy ra");
                }
            });
        </script>
    </body>
</html>
